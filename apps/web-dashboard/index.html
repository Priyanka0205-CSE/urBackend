<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/yash-pouranik/urBackend/apps/web-dashboard/public/LOGO_SQ.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>urBackend | Instant Backend for Developers</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var storageKeys = ['theme', 'color-theme', 'colorTheme', 'mode'];
        var storedValue = null;

        for (var i = 0; i < storageKeys.length; i += 1) {
          var value = localStorage.getItem(storageKeys[i]);
          if (value) {
            storedValue = value;
            break;
          }
        }

        var normalizedValue = (storedValue || '').toLowerCase();
        var shouldUseLightMode;
        if (normalizedValue) {
          shouldUseLightMode =
            normalizedValue === 'light' ||
            normalizedValue === 'light-mode' ||
            normalizedValue === 'true';
        } else {
          shouldUseLightMode =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: light)').matches;
        }

        document.documentElement.classList.toggle('light-mode', shouldUseLightMode);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
